box_sizes:
  niw_core: -1 # Number of bosonic frequencies used from G2(w,v,v'); default: -1 (all)
  niv_core: -1 # Number of fermionic frequencies used from G2(w,v,v'); default: -1 (all)
  niv_shell: 0 # Number of fermionic frequencies used for explicit asymptotics. If left at 0, no asymptotics are used. Default: 0

lattice:
  symmetries: "auto" # Specify lattice symmetry group. For availability, check out the file 'brillouin_zone.py'
  type: "from_wannier90" # Specifies the hopping elements, either from a wannier90 file 'from_wannier90', from a hk file 'from_wannierHK' or from tight-binding parameters 't_tp_tpp'
  hr_input: "/path/to/file" # full path to the wannier_hr.dat/wannier.hk file or list of tight-binding parameters [t, tp, tpp] (only for single-orbital)
  interaction_type: "one_band_from_dmft" # Type of interaction. Available: ['one_band_from_dmft', 'kanamori_from_dmft', 'custom'].
  # If 'one_band_from_dmft' or if interaction_type is left empty, we use the single-band interaction from DMFT. If 'kanamori_from_dmft', the interaction is parsed from the DMFT
  # calculation. If 'custom', please specify the full path to a file in 'interaction_input' containing orbital and spacial entries for the interaction matrix
  # (similar to how a wannier_hr.dat file is structured, but with 4 orbital indices).
  interaction_input: "" # Full path to the interaction file if interaction_type is 'custom', otherwise the interaction data will be taken from DMFT
  nk: [ 32, 32, 1 ] # Number of k-points in x, y and z-direction. Default: [ 16, 16, 1 ]
  #nq: [ 16, 16, 1 ] # Number of q-points in x, y and z-direction. Default: [ 16, 16, 1 ]. If left empty, nq is set to nk

self_consistency:
  max_iter: 20 # Maximum number of iterations
  epsilon: 1e-4 # Convergence criterion of the self-energy for the first (niv_core / 5) frequencies
  mixing: 0.2 # Linear Mixing parameter for the self-energy: sigma_new = mixing * sigma_new + (1 - mixing) * sigma_old. Will be
  # used in every iteration if the mixing strategy is set to 'linear' and only for the first couple iterations if the mixing strategy is set to "pulay".
  mixing_strategy: "linear" # Available mixing strategies: "linear", "pulay" or "anderson".
  mixing_history_length: 3 # Number of previous iterations used for Pulay mixing. Default: 3
  previous_sc_path: "" # Path to the previous self-consistency folder. If not specified, the code will start a new calculation from scratch. If specified,
  # the code will start from the last iteration of the previous calculation and does max_iter steps on top
  use_lambda_correction: False # If True, the code will perform a lambda correction for each iteration, and it will automatically set perform_lambda_correction in the settings below to True.
  restrict_chi_phys: False # If True, the physical susceptibilities will be restricted to positive values during the self-consistency cycle.

lambda_correction:
  perform_lambda_correction: False # If True, the code will perform a lambda correction. This is only possible for single-orbital systems!
  type: "spch" # available types of lambda correction: 'spch' (both density and magnetic channel) or 'sp' (magnetic channel only)

dmft_input:
  type: "w2dyn" # Input format. Available is 'w2dyn'
  input_path: "./" # Folder containing the input files. Default: current directory
  fname_1p: "1p-data.hdf5" # Filename of the one-particle DMFT calculation; default: 1p-data.hdf5
  fname_2p: "g4iw_sym.hdf5" # Name of the two-particle DMFT calculation; default: g4iw_sym.hdf5
  do_sym_v_vp: True # If True, the code will symmetrize G2 from DMFT in the v and vp indices
  symmetrize_orbitals: [] # List of orbitals that will be symmetrized, starting from 1 (first orbital is 1, second orbital is 2, etc.).
  # If left empty, no symmetrization will be performed in the orbital indices. This is only relevant for multi-orbital systems.
  # Can be [1,2] or [[1,2]] for a two-orbital system with degenerate orbitals, for example. Also possible are statements like
  # [[1,2], [3,4]] for a four-orbital system with two pairs of degenerate orbitals or [[1,2,3,4]] for a four-orbital system with four degenerate orbitals.
  # This will be applied on every inequivalent atom individually!
  n_ineq: 1 # Number of inequivalent atoms in w2dynamics
  ineq_ordering: [ 1 ] # List of ordering of the inequivalent atoms for the orbital-diagonal entries in DGA. This is only relevant
  # for multi-orbital systems with more than one inequivalent atom specified in w2dynamics.

eliashberg:
  perform_eliashberg: False # If True, the code will perform a power iteration to solve the linearized Eliashberg equation for the superconducting eigenvalues and gap functions
  save_pairing_vertex: False # if true, saves the s/t pairing vertices Gamma(qvv') for the irreducible BZ to files. Attention: this could be a large file!
  save_fq: False # If True, saves the full d/m vertex F(qvv') for the irreducible BZ to files. Attention: this could be a large file!
  construct_fq_cheap: False # If True, the code will construct F(qvv') for the d/m channels in a way that is less memory intensive (only 1/4) but also less accurate. This is recommended for large frequency boxes.
  n_eig: 4 # Number of eigenvalues and eigenvectors to be calculated. Default: 4
  epsilon: 1e-6 # Convergence criterion for the eigenvalues and eigenvectors
  symmetry: "random" # Symmetry of the gap function that will be used as a starting point for the power iteration. Available: p-wave-x, p-wave-y, d-wave, random
  include_local_part: False # If True, the local part of the pairing vertex is included in the Eliashberg calculation. This is only relevant if one might expect s-wave symmetry.
  # setting this to True will reduce the frequency box of the pairing vertex slightly due to an additional frequency shift that is necessary.
  subfolder_name: "Eliashberg" # name for the subfolder where certain outputs are generated

self_energy_interpolation:
  do_interpolation: False # If True, the code will interpolate the self-energy to a different frequency and beta in each iteration
  target_beta: 1.0 # Target inverse temperature for the interpolation
  target_niv: 10 # Target number of fermionic frequencies for the interpolation

output:
  output_path: "" # Path, where the DGA output folders are created. If not specified, the output is created in the input folder directory of the DMFT files
  do_plotting: True # If True, the code will plot some results into the output folder
  plotting_subfolder_name: "Plots" # name for the subfolder where the plots are saved

ana_cont:
  do_ana_cont_green_dga: False # If True, the code will perform an analytic continuation of the DGA Green's function
  # using the maximum entropy method from the ana_cont package.
  do_ana_cont_green_dmft: False # If True, the code will perform an analytic continuation of the DMFT Green's function
  # and self-energy using the maximum entropy method from the ana_cont package.
  w_count: 1001 # Number of real-frequency points for the analytic continuation.
  plot_spectrum: True # If True, the code will plot the spectral function after the analytic continuation.
  k_path: [ [0.0, 0.0, 0.0, "Gamma"], [0.0, 0.5, 0.0, "X"], [0.5, 0.5, 0.0, "M"], [0.0, 0.0, 0.0, "Gamma"] ] # k-path
  # for the plot of the spectral function. The format is a list of lists, where each sub-list contains the 3d k-point in
  # fractional coordinates in the primitive (not conventional!) k-space basis, and the label for the plot.
  energy_window: [ -2, 3 ] # Energy window for the plot of the spectral function in eV.

memory:
  save_memory_for_chi0q: False # If True, the code will construct chi0(q) in a way that is more memory efficient,
  # but much slower. If False, the code will use FFT, which requires larger intermediate arrays, but is much faster.
  save_memory_for_chiq_aux: False # If True, the code will construct the auxiliary susceptibility chi(q) (equal in size
  # compared to F(q)) in a way that is more memory efficient, but much slower.
  save_memory_for_sde: False # If True, the code will perform the calculations in a more
  # memory efficient way, without the use of FFTs. Setting it to False will not increase the memory usage significantly,
  # but it is much faster.
  save_memory_for_fq: False # If True, the code will construct F(qvv') for the d/m channels in a way that is
  # less memory intensive, but it will increase runtime.
  save_memory_for_lanczos: False # If True, the code will perform the Lanczos algorithm with the pairing vertex for
  # the Eliashberg calculation in a more memory efficient way. This will reduce memory usage but increase runtime
  # due to required MPI communication in each Lanczos step.