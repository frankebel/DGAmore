box_sizes:
  niw_core: -1 # Number of bosonic frequencies used from G2(w,v,v'); default: -1 (all)
  niv_core: -1 # Number of fermionic frequencies used from G2(w,v,v'); default: -1 (all)
  niv_shell: 0 # Number of fermionic frequencies used for explicit asymptotics. If left at 0, no asymptotics are used. Default: 0

lattice:
  symmetries: ["x-inv", "y-inv", "z-inv"] # Specify lattice symmetry group. For availability, check out the file 'brillouin_zone.py'
  type: "from_wannierHK" # Specifies the hopping elements, either from a wannier90 file 'from_wannier90', from a hk file 'from_wannierHK' or from tight-binding parameters 't_tp_tpp'
  hr_input: "/home/julpe/Documents/repos/DGAmore/tests/test_data/srvo3_end2end/wan_4x4.hk" # full path to the wannier_hr.dat/wannier.hk file or list of tight-binding parameters [t, tp, tpp] (only for single-orbital)
  interaction_type: "kanamori_from_dmft" # Type of interaction. Available: ['one_band_from_dmft', 'kanamori_from_dmft', 'custom'].
  # If 'one_band_from_dmft' or if interaction_type is left empty, we use the single-band interaction from DMFT. If 'kanamori_from_dmft', the interaction is parsed from the DMFT
  # calculation. If 'custom', please specify the full path to a file in 'interaction_input' containing orbital and spacial entries for the interaction matrix
  # (similar to how a wannier_hr.dat file is structured, but with 4 orbital indices).
  interaction_input: [ 1, 0, 0, 0 ] # Full path to the interaction file or list of interaction parameters [n_bands, U, J, U'] (U' is optional; if left empty, U' is set to U-2J)
  # this parameter will only be used if interaction_type is either 'kanamori' or 'custom'
  orbital_basis: "t2g"
  nk: [ 4,4,4 ] # Number of k-points in x, y and z-direction. Default: [ 16, 16, 1 ]
  #nq: [ 16, 16, 1 ] # Number of q-points in x, y and z-direction. Default: [ 16, 16, 1 ]. If left empty, nq is set to nk

self_consistency:
  max_iter: 1 # Maximum number of iterations
  epsilon: 1e-4 # Convergence criterion of the self-energy for each frequency
  mixing: 0.3 # Linear Mixing parameter for the self-energy: sigma_new = mixing * sigma_new + (1 - mixing) * sigma_old. Will be
  # used in every iteration if the mixing strategy is set to 'linear' and only for the first couple iterations if the mixing strategy is set to "pulay".
  mixing_strategy: "pulay" # Available mixing strategies: "linear", "pulay" or "anderson".
  mixing_history_length: 2 # Number of previous iterations used for Pulay mixing. Default: 2
  previous_sc_path: "" # Path to the previous self-consistency folder. If not specified, the code will start a new calculation from scratch. If specified,
  # the code will start from the last iteration of the previous calculation and do max_iter steps on top
  use_lambda_correction: False # If True, the code will perform a lambda correction for each iteration. Note that perform_lambda_correction below needs to be set to True also!
  restrict_chi_phys: False # If True, the physical susceptibilities will be restricted to positive values during the self-consistency cycle.

lambda_correction:
  perform_lambda_correction: False # If True, the code will perform a lambda correction and not a self-consistency scheme. This is only possible for single-orbital systems!
  type: "spch" # available types of lambda correction: 'spch' (both density and magnetic channel) or 'sp' (magnetic channel only)

dmft_input:
  type: "w2dyn" # Input format. Available is 'w2dyn'
  input_path: "/home/julpe/Documents/repos/DGAmore/tests/test_data/srvo3_end2end/" # Folder containing the input files. Default: current directory
  fname_1p: "1p-data.hdf5" # Filename of the one-particle DMFT calculation; default: 1p_data.hdf5
  fname_2p: "g4iw_sym.hdf5" # Name of the two-particle DMFT calculation; default: g4iw_sym.hdf5
  do_sym_v_vp: True # If True, the code will symmetrize G2 in the v and vp indices
  symmetrize_orbitals: [ 1,2,3 ] # List of orbitals that will be symmetrized, starting from 1 (first orbital is 1, second orbital is 2, etc.).
  # If left empty, no symmetrization will be performed in the orbital indices. This is only relevant for multi-orbital systems.

eliashberg:
  perform_eliashberg: False # If True, the code will perform a power iteration to solve the linearized Eliashberg equation
  save_pairing_vertex: False # if true, saves the pairing vertex to a file
  save_fq: False # If True, the code will save the full vertex F(qvv') for d/m channels to a file. Attention: this will be a large file!
  n_eig: 4 # Number of eigenvalues and eigenvectors to be calculated. Default: 4
  epsilon: 1e-12 # Convergence criterion for the eigenvalues and eigenvectors
  symmetry: "random" # Symmetry of the gap function that will be used as a starting point for the power iteration. Available: p-wave-x, p-wave-y, d-wave, random
  include_local_part: True # If True, the local part of the pairing vertex is included in the Eliashberg calculation. This is only relevant if one might expect s-wave symmetry.
  # setting this to True will reduce the frequency box of the pairing vertex slightly due to an additional frequency shift that is necessary.
  subfolder_name: "Eliashberg" # name for the subfolder where certain outputs are generated

self_energy_interpolation:
  do_interpolation: False # If True, the code will interpolate the self-energy to a different frequency and beta in each iteration
  target_beta: 1.0 # Target inverse temperature for the interpolation
  target_niv: 10 # Target number of fermionic frequencies for the interpolation

output:
  output_path: "" # Path, where the DGA output folders are created. If not specified, the output is created in the input folder directory of the DMFT files
  do_plotting: False # If True, the code will plot the results into the output folder
  plotting_subfolder_name: "Plots" # name for the subfolder where the plots are saved
